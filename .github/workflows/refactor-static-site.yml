name: Refactor static site files

on:
  push:
    paths:
      - '.github/workflows/refactor-static-site.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Split single HTML file into static assets
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          root = Path('.')
          index_path = root / 'index.html'
          text = index_path.read_text(encoding='utf-8')

          style_start = text.index('<style>') + len('<style>')
          style_end = text.index('</style>', style_start)
          css = text[style_start:style_end].strip() + '\n'

          script_start = text.index('<script>') + len('<script>')
          script_end = text.rindex('</script>')
          script = text[script_start:script_end].strip()

          data_marker = 'var DATA = '
          data_start = script.index(data_marker) + len(data_marker)
          data_end = script.index(';\nvar LIVE_OVERRIDES_CSV_URL', data_start)
          data_raw = script[data_start:data_end]
          data = json.loads(data_raw)

          old_notes = {
              'Mobilguiden er én samlet index.html med indlejret data, så Netlify kun behøver én fil.',
              'Mobilguiden er én samlet index.html med indlejret data og hostes direkte via GitHub Pages.'
          }
          new_note = 'Mobilguiden er opdelt i index.html, styles.css, app.js og data/vm2026-data.json, så GitHub Pages kan opdatere siden mere overskueligt.'
          notes = data.get('meta', {}).get('sourceNotes', [])
          data['meta']['sourceNotes'] = [new_note if note in old_notes else note for note in notes]
          data_json = json.dumps(data, ensure_ascii=False, indent=2) + '\n'

          app_js = 'var DATA = null;\n' + script[script.index('var LIVE_OVERRIDES_CSV_URL'):]
          load_base = """var currentFilter = 'all';\n\nasync function loadBaseData(){\n  try{\n    setStatus('Henter kampdata...');\n    var res = await fetch('data/vm2026-data.json', {cache:'no-store'});\n    if(!res.ok) throw new Error('HTTP '+res.status);\n    DATA = await res.json();\n    setStatus('Senest opdateret '+fmtUpdated(DATA.meta.generatedAt)+' · grunddata');\n  } catch(e){\n    console.error('Grunddata kunne ikke hentes', e);\n    setStatus('Kunne ikke indlæse VM data');\n    throw e;\n  }\n}\n"""
          app_js = app_js.replace("var currentFilter = 'all';\n", load_base, 1)

          new_structure = """function renderStructure(){\nvar h='';\nh+='<article class="ruleCard structureImageCard"><h3>Turneringsstruktur</h3>';\nh+='<div class="structureImageShell"><img src="assets/structure.svg" alt="VM 2026 turneringsstruktur" loading="eager"></div>';\nh+='<p class="structureHint">Swipe vandret for at se hele strukturen. Diagrammet er lagt som separat SVG, så siden ikke længere bærer en stor indlejret PNG i JavaScript.</p>';\nh+='<div class="structureQuick"><div><strong>12 grupper</strong>Top 2 fra hver gruppe går direkte videre.</div><div><strong>8 bedste treere</strong>De bedste tredjepladser fylder de variable pladser i runde af 32.</div><div><strong>Runde af 32</strong>Herefter er det ren knockout frem til finalen.</div></div>';\nh+='</article>';\nbyId('structureList').innerHTML=h;\n}\n"""
          app_js, replaced = re.subn(r'function renderStructure\(\)\{\n.*?\n\}\n\n\nfunction parseCSVLine', new_structure + '\n\nfunction parseCSVLine', app_js, count=1, flags=re.S)
          if replaced != 1:
              raise SystemExit('Kunne ikke erstatte renderStructure')

          app_js = app_js.replace('async function init(){\n  await loadLiveOverrides();', 'async function init(){\n  await loadBaseData();\n  await loadLiveOverrides();', 1)

          index_html = (
              text[:style_start-len('<style>')]
              + '<link rel="stylesheet" href="styles.css" />\n'
              + text[style_end+len('</style>'):script_start-len('<script>')]
              + '<script src="app.js" defer></script>\n'
              + text[script_end+len('</script>'):]
          )

          svg = '''<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
<title id="title">VM 2026 turneringsstruktur</title>
<desc id="desc">Oversigt over gruppespil, de bedste treere og knockoutfasen frem til finalen.</desc>
<rect width="1180" height="520" fill="#020408"/>
<defs>
  <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0" stop-color="#173452"/>
    <stop offset="1" stop-color="#0b1828"/>
  </linearGradient>
  <style>
    .box{fill:url(#g);stroke:rgba(255,255,255,.24);stroke-width:2;rx:18;ry:18}
    .accent{fill:#12364f;stroke:#72d6ff;stroke-width:2.5;rx:18;ry:18}
    .txt{fill:#f5f7fb;font:700 22px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}
    .small{fill:#aab6c8;font:500 16px -apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif}
    .line{stroke:#72d6ff;stroke-width:3;stroke-linecap:round;opacity:.78}
  </style>
</defs>
<text x="42" y="54" class="txt" font-size="30">VM 2026 struktur</text>
<text x="42" y="82" class="small">Fra 48 hold til én verdensmester</text>
<rect x="42" y="132" width="190" height="116" class="box"/>
<text x="68" y="176" class="txt">Gruppespil</text>
<text x="68" y="207" class="small">12 grupper à 4 hold</text>
<rect x="282" y="132" width="190" height="116" class="box"/>
<text x="308" y="176" class="txt">Top 2</text>
<text x="308" y="207" class="small">24 hold går videre</text>
<rect x="282" y="300" width="190" height="116" class="box"/>
<text x="308" y="344" class="txt">8 bedste</text>
<text x="308" y="375" class="small">treere går videre</text>
<rect x="522" y="206" width="190" height="116" class="accent"/>
<text x="548" y="250" class="txt">Runde af 32</text>
<text x="548" y="281" class="small">32 hold i knockout</text>
<rect x="762" y="132" width="160" height="92" class="box"/>
<text x="786" y="170" class="txt">1/8</text>
<text x="786" y="198" class="small">16 hold</text>
<rect x="762" y="300" width="160" height="92" class="box"/>
<text x="786" y="338" class="txt">1/4</text>
<text x="786" y="366" class="small">8 hold</text>
<rect x="972" y="132" width="160" height="92" class="box"/>
<text x="996" y="170" class="txt">Semi</text>
<text x="996" y="198" class="small">4 hold</text>
<rect x="972" y="300" width="160" height="92" class="accent"/>
<text x="996" y="338" class="txt">Finale</text>
<text x="996" y="366" class="small">Én vinder</text>
<line x1="232" y1="190" x2="282" y2="190" class="line"/>
<line x1="472" y1="190" x2="522" y2="250" class="line"/>
<line x1="472" y1="358" x2="522" y2="278" class="line"/>
<line x1="712" y1="264" x2="762" y2="178" class="line"/>
<line x1="842" y1="224" x2="842" y2="300" class="line"/>
<line x1="922" y1="178" x2="972" y2="178" class="line"/>
<line x1="1052" y1="224" x2="1052" y2="300" class="line"/>
<text x="42" y="470" class="small">Tip: Tabellen beregnes ud fra indtastede resultater. Slutspilsparringer kan udfyldes, når gruppespillet afgør placeringerne.</text>
</svg>
'''

          (root / 'data').mkdir(exist_ok=True)
          (root / 'assets').mkdir(exist_ok=True)
          (root / 'styles.css').write_text(css, encoding='utf-8')
          (root / 'app.js').write_text(app_js, encoding='utf-8')
          (root / 'data' / 'vm2026-data.json').write_text(data_json, encoding='utf-8')
          (root / 'assets' / 'structure.svg').write_text(svg, encoding='utf-8')
          index_path.write_text(index_html, encoding='utf-8')
          PY

      - name: Validate JavaScript and JSON
        run: |
          node --check app.js
          python -m json.tool data/vm2026-data.json > /tmp/vm2026-data.check.json

      - name: Commit refactor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Ingen ændringer at committe"
            exit 0
          fi
          git add index.html styles.css app.js data/vm2026-data.json assets/structure.svg
          git commit -m "Split VM guide into static assets"
          git push
