name: Refactor static site files

on:
  push:
    paths:
      - '.github/workflows/refactor-static-site.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Split index.html
        run: |
          python - <<'PY'
          from pathlib import Path
          import json, re
          p=Path('index.html')
          t=p.read_text(encoding='utf-8')
          css=re.search(r'<style>(.*?)</style>',t,re.S).group(1).strip()+'\n'
          script=re.search(r'<script>(.*)</script>',t,re.S).group(1).strip()
          raw=script.split('var DATA = ',1)[1].split(';\nvar LIVE_OVERRIDES_CSV_URL',1)[0]
          data=json.loads(raw)
          notes=data.get('meta',{}).get('sourceNotes',[])
          if notes:
            notes[0]='Mobilguiden er opdelt i index.html, styles.css, app.js og data/vm2026-data.json, så GitHub Pages kan opdatere siden mere overskueligt.'
          data['meta']['sourceNotes']=notes
          rest='var DATA = null;\n'+script[script.index('var LIVE_OVERRIDES_CSV_URL'):]
          loader="""var currentFilter = 'all';\n\nasync function loadBaseData(){\n  setStatus('Henter kampdata...');\n  var res=await fetch('data/vm2026-data.json',{cache:'no-store'});\n  if(!res.ok) throw new Error('HTTP '+res.status);\n  DATA=await res.json();\n  setStatus('Senest opdateret '+fmtUpdated(DATA.meta.generatedAt)+' · grunddata');\n}\n"""
          rest=rest.replace("var currentFilter = 'all';\n",loader,1)
          struct="""function renderStructure(){\nvar h='';\nh+='<article class="ruleCard structureImageCard"><h3>Turneringsstruktur</h3>';\nh+='<div class="structureImageShell"><img src="assets/structure.svg" alt="VM 2026 turneringsstruktur" loading="eager"></div>';\nh+='<p class="structureHint">Swipe vandret for at se hele strukturen. Diagrammet er nu en separat SVG frem for en stor indlejret PNG.</p>';\nh+='<div class="structureQuick"><div><strong>12 grupper</strong>Top 2 går videre.</div><div><strong>8 bedste treere</strong>Fylder de sidste pladser.</div><div><strong>Knockout</strong>Runde af 32 til finale.</div></div>';\nh+='</article>';\nbyId('structureList').innerHTML=h;\n}\n"""
          rest,n=re.subn(r'function renderStructure\(\)\{.*?\n\}\n\n\nfunction parseCSVLine',struct+'\n\nfunction parseCSVLine',rest,count=1,flags=re.S)
          if n!=1: raise SystemExit('renderStructure blev ikke fundet')
          rest=rest.replace('async function init(){\n  await loadLiveOverrides();','async function init(){\n  await loadBaseData();\n  await loadLiveOverrides();',1)
          html=re.sub(r'<style>.*?</style>','<link rel="stylesheet" href="styles.css" />',t,count=1,flags=re.S)
          html=re.sub(r'<script>.*</script>','<script src="app.js" defer></script>',html,count=1,flags=re.S)
          Path('data').mkdir(exist_ok=True); Path('assets').mkdir(exist_ok=True)
          Path('styles.css').write_text(css,encoding='utf-8')
          Path('app.js').write_text(rest,encoding='utf-8')
          Path('data/vm2026-data.json').write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          Path('assets/structure.svg').write_text('<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520"><rect width="1180" height="520" fill="#020408"/><text x="48" y="70" fill="#f5f7fb" font-size="34" font-family="Arial" font-weight="700">VM 2026 struktur</text><text x="48" y="118" fill="#aab6c8" font-size="20" font-family="Arial">48 hold → 12 grupper → 32 hold i knockout → finale</text><g fill="#12364f" stroke="#72d6ff" stroke-width="2"><rect x="60" y="180" width="220" height="110" rx="18"/><rect x="340" y="180" width="220" height="110" rx="18"/><rect x="620" y="180" width="220" height="110" rx="18"/><rect x="900" y="180" width="220" height="110" rx="18"/></g><g fill="#f5f7fb" font-size="24" font-family="Arial" font-weight="700"><text x="98" y="244">Gruppespil</text><text x="390" y="244">Top 2 + 8</text><text x="660" y="244">Runde af 32</text><text x="970" y="244">Finale</text></g><g stroke="#72d6ff" stroke-width="4"><line x1="280" y1="235" x2="340" y2="235"/><line x1="560" y1="235" x2="620" y2="235"/><line x1="840" y1="235" x2="900" y2="235"/></g></svg>\n',encoding='utf-8')
          p.write_text(html,encoding='utf-8')
          PY
      - name: Validate
        run: |
          node --check app.js
          python -m json.tool data/vm2026-data.json >/tmp/data.json
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js data/vm2026-data.json assets/structure.svg
          git commit -m "Split VM guide into smaller static files" || exit 0
          git push

# trigger compact refactor
