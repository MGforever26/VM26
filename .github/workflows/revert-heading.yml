name: Revert heading wording

on:
  push:
    paths:
      - '.github/workflows/revert-heading.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  revert-heading:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Revert index heading
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<div class="eyebrow">Mobilguide · GitHub Pages</div>'
          new = '<div class="eyebrow">Mobilguide</div>'
          if old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
          elif new in text:
              print('Heading er allerede korrekt')
          else:
              raise SystemExit('Kunne ikke finde heading')
          PY

      - name: Commit heading revert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Ingen ændringer at committe"
            exit 0
          fi
          git add index.html
          git commit -m "Revert VM guide heading"
          git push
