name: Add scorers feature

on:
  push:
    paths:
      - 'feature-run.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-feature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          index = Path('index.html')
          html = index.read_text(encoding='utf-8')
          if 'data-view="scorers"' not in html:
              html = html.replace('<button class="tab" data-view="rules">Vigtige regler</button>', '<button class="tab" data-view="rules">Vigtige regler</button>\n  <button class="tab" data-view="scorers">Topscorere</button>')
              html = html.replace('<section id="rulesView" class="view"><section class="panel"><h2>Vigtige regler</h2><div id="rulesList"></div></section></section>', '<section id="rulesView" class="view"><section class="panel"><h2>Vigtige regler</h2><div id="rulesList"></div></section></section>\n<section id="scorersView" class="view"><section class="panel"><h2>Topscorere</h2><p class="muted">Beregnes automatisk ud fra målscorerdata i kampene.</p><div id="scorersList"></div></section></section>')
          index.write_text(html, encoding='utf-8')

          app = Path('app.js')
          js = app.read_text(encoding='utf-8')

          card_block = r'''function parseScorerList(text, team){
  if(!text) return [];
  return String(text).split(/[;|]/).map(function(raw){
    var s=raw.trim();
    if(!s) return null;
    var minute='';
    var m=s.match(/(\d+\+?\d*)\s*['’]?/);
    if(m){ minute=m[1]+"'"; s=s.replace(m[0],'').trim(); }
    s=s.replace(/^[-:,\s]+|[-:,\s]+$/g,'');
    return {team:team||'', player:s, minute:minute};
  }).filter(Boolean);
}
function getGoals(m){
  var goals=[];
  if(Array.isArray(m.goals)){
    m.goals.forEach(function(g){goals.push({team:g.team||'', player:g.player||g.name||'', minute:g.minute||'', note:g.note||'', ownGoal:!!g.ownGoal});});
  }
  goals=goals.concat(parseScorerList(m.homeScorers, m.homeTeam));
  goals=goals.concat(parseScorerList(m.awayScorers, m.awayTeam));
  if(!goals.length && m.scorers){ goals=goals.concat(parseScorerList(m.scorers, '')); }
  return goals.filter(function(g){return g.player;});
}
function goalsHtml(m){
  var goals=getGoals(m);
  var h='<div class="goalDetails">';
  if(goals.length){
    h+='<div class="detailTitle">Målscorere</div><ul class="goalList">';
    goals.forEach(function(g){h+='<li><span>'+esc(g.player)+'</span><em>'+esc((g.team?g.team+' · ':'')+(g.minute||'')+(g.ownGoal?' · selvmål':'')+(g.note?' · '+g.note:''))+'</em></li>'});
    h+='</ul>';
  } else if(m.status==='finished' && m.homeScore!=null){
    h+='<div class="detailTitle">Målscorere</div><p class="empty">Målscorere er ikke lagt ind for denne kamp endnu.</p>';
  } else {
    h+='<div class="detailTitle">Kampdetaljer</div><p class="empty">Målscorere vises her, når kampen er spillet og data er opdateret.</p>';
  }
  h+='<div class="detailMeta">'+esc(m.stadium)+', '+esc(m.city)+' · '+esc(m.channel||'Kanal afventer')+'</div></div>';
  return h;
}
function card(m){var score=(m.status==='finished'&&m.homeScore!=null)?' '+m.homeScore+' - '+m.awayScore:''; return '<details class="card '+(m.status==='finished'?'finished':'')+'"><summary class="matchSummary"><div class="meta"><span>'+esc(m.danishTime)+'</span><span>·</span><span>'+esc(m.group||m.stage)+'</span><span>·</span>'+channelBadge(m)+'</div><div class="teams">'+esc(m.homeTeam)+' - '+esc(m.awayTeam)+score+'</div><div class="venue">'+esc(m.stadium)+', '+esc(m.city)+' · Lokal tid '+esc(m.localTime)+'</div><div class="tapHint">Tryk for målscorere</div></summary>'+goalsHtml(m)+'</details>'}
'''
          js = re.sub(r"function card\(m\)\{.*?\}\nfunction renderMini", card_block + "function renderMini", js, count=1, flags=re.S)

          rules_block = """function renderRules(){byId('rulesList').innerHTML=
'<article class="ruleCard"><h3>Turneringsformat</h3><ul><li>48 hold er fordelt i 12 grupper med fire hold i hver.</li><li>Nummer 1 og 2 i hver gruppe går videre.</li><li>Derudover går de otte bedste treere videre, så slutspillet starter med 32 hold.</li></ul></article>'+ 
'<article class="ruleCard"><h3>Point og tiebreakers</h3><ul><li>Sejr giver 3 point, uafgjort 1 point, nederlag 0 point.</li><li>Ved lige point bruges først indbyrdes opgør mellem de hold, der står lige: point, målforskel og scorede mål i de indbyrdes kampe.</li><li>Hvis det stadig er lige, bruges samlet målforskel i alle gruppekampe og derefter flest scorede mål i alle gruppekampe.</li><li>Derefter bruges fair play score og til sidst FIFA rangering.</li></ul><div class="ruleNote">“Målrelaterede kriterier” betyder altså både målforskel og antal scorede mål, først i indbyrdes kampe og senere samlet i gruppen.</div></article>'+ 
'<article class="ruleCard"><h3>Advarsler og karantæner</h3><ul><li>To gule kort i forskellige kampe giver karantæne i næste kamp.</li><li>Gule kort nulstilles efter gruppespillet.</li><li>Gule kort nulstilles igen efter kvartfinalerne.</li><li>Rødt kort giver som udgangspunkt karantæne i næste kamp og kan udløse længere straf.</li></ul><div class="ruleNote">Praktisk konsekvens: et gult kort fra gruppespillet bæres ikke med ind i knockoutfasen.</div></article>'+ 
'<article class="ruleCard"><h3>Slutspil</h3><ul><li>Fra sekstendedelsfinalerne skal alle kampe have en vinder.</li><li>Ved uafgjort efter 90 minutter spilles 2 x 15 minutters forlænget spilletid.</li><li>Er der stadig uafgjort, afgøres kampen på straffespark.</li></ul></article>'+ 
'<article class="ruleCard"><h3>Nye og kuriøse regler</h3><ul><li>Dommeren kan bruge en synlig femsekunders nedtælling ved forsinkede indkast og målspark.</li><li>Ved for langsom igangsættelse kan modstanderen få bolden eller hjørnespark afhængigt af situationen.</li><li>Udskiftede spillere skal som udgangspunkt forlade banen hurtigt; overskrides fristen, kan indskifteren blive forsinket.</li><li>VAR kan bruges bredere end tidligere, blandt andet ved flere typer kendelser omkring kort, identitet og situationer før mål eller dødbolde.</li><li>Fem udskiftninger er normalt rammen i ordinær spilletid; i forlænget spilletid gives der typisk en ekstra mulighed.</li></ul></article>'+ 
'<article class="ruleCard"><h3>Praktisk brug</h3><ul><li>Fanen Kampe er til hurtig mobilbrug.</li><li>Tabeller beregnes ud fra indtastede resultater.</li><li>Kanaler og målscorere kan opdateres løbende, når officielle kilder ændrer sig.</li></ul></article>'}

function renderStructure"""
          js = re.sub(r"function renderRules\(\)\{[\s\S]*?\}\n\nfunction renderStructure", rules_block, js, count=1)

          scorers_block = r'''
function collectGoalRows(){
  var rows=[];
  (DATA.matches||[]).forEach(function(m){
    getGoals(m).forEach(function(g){
      var name=(g.player||'').replace(/\s*\((selvmål|own goal|og)\)\s*/i,'').trim();
      if(!name || g.ownGoal || /selvmål|own goal|\bog\b/i.test(g.player)) return;
      rows.push({player:name, team:g.team||'', match:m.homeTeam+' - '+m.awayTeam});
    });
  });
  return rows;
}
function renderScorers(){
  var el=byId('scorersList'); if(!el) return;
  var counts={};
  collectGoalRows().forEach(function(g){
    var key=g.player+'|'+g.team;
    if(!counts[key]) counts[key]={player:g.player, team:g.team, goals:0, matches:{}};
    counts[key].goals++;
    counts[key].matches[g.match]=1;
  });
  var rows=Object.values(counts).sort(function(a,b){return b.goals-a.goals || a.player.localeCompare(b.player,'da')});
  if(!rows.length){el.innerHTML='<p class="empty">Topscorerlisten vises her, når målscorerdata er lagt ind i kampene eller livearket.</p>'; return;}
  var h='<div class="scorerTable"><div class="scorerRow scorerHead"><span>Spiller</span><span>Hold</span><span>Mål</span></div>';
  rows.forEach(function(r){h+='<div class="scorerRow"><span>'+esc(r.player)+'</span><span>'+esc(r.team||'')+'</span><strong>'+r.goals+'</strong></div>'});
  h+='</div><p class="sourceLine">Beregnet ud fra målscorere på kampkortene.</p>';
  el.innerHTML=h;
}
'''
          if 'function renderScorers()' not in js:
              js = js.replace('function renderStructure(){', scorers_block + '\nfunction renderStructure(){', 1)
          if 'renderScorers();' not in js:
              js = js.replace('renderRules();', 'renderRules();\n  renderScorers();', 1)
          js = js.replace("if(r.lastUpdated) { m.lastUpdated = r.lastUpdated; updatedAt = r.lastUpdated; }", "if(r.lastUpdated) { m.lastUpdated = r.lastUpdated; updatedAt = r.lastUpdated; }\n    ['homeScorers','awayScorers','scorers','goals'].forEach(function(k){ if(r[k]) m[k]=r[k]; });")

          app.write_text(js, encoding='utf-8')

          css = Path('styles.css')
          style = css.read_text(encoding='utf-8')
          addon = r'''

/* v14: match scorers and Golden Boot tab */
.card{display:block;}
.matchSummary{list-style:none;cursor:pointer;}
.matchSummary::-webkit-details-marker{display:none;}
.tapHint{font-size:12px;color:var(--accent);font-weight:800;margin-top:5px;}
.goalDetails{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.detailTitle{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:850;margin-bottom:7px;}
.goalList{list-style:none;margin:0;padding:0;display:grid;gap:7px;}
.goalList li{display:flex;justify-content:space-between;gap:10px;background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:13px;padding:8px 9px;}
.goalList span{font-weight:800;}
.goalList em{font-style:normal;color:var(--muted);font-size:12px;text-align:right;}
.detailMeta{font-size:12px;color:var(--muted);margin-top:9px;}
.scorerTable{display:grid;gap:6px;}
.scorerRow{display:grid;grid-template-columns:1.4fr 1fr 48px;gap:8px;align-items:center;background:rgba(255,255,255,.045);border:1px solid var(--line);border-radius:13px;padding:9px 10px;font-size:14px;}
.scorerHead{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em;font-weight:850;background:transparent;border-color:transparent;padding-bottom:3px;}
.scorerRow strong{text-align:right;color:var(--accent);font-size:18px;}
@media (max-width:430px){.scorerRow{grid-template-columns:1.4fr .9fr 42px;font-size:13px}.goalList li{display:block}.goalList em{display:block;text-align:left;margin-top:2px}}
'''
          if 'v14: match scorers' not in style:
              style += addon
          css.write_text(style, encoding='utf-8')
          PY
      - name: Validate
        run: node --check app.js
      - name: Commit feature
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html app.js styles.css
          git commit -m "Add match scorers and top scorer tab" || exit 0
          git push
